services:
  - type: web
    name: trendpulse-engine
    runtime: docker
    dockerfilePath: ./engine/Dockerfile
    dockerContext: ./engine
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: KEYWORD_REGEX_WEIGHTS
        sync: false
      - key: HIGH_INTENT_PHRASES
        sync: false
